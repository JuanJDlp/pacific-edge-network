---
- name: Actualizar cache de apt
  apt:
    update_cache: yes
  become: yes

- name: Instalar Bind9 y utilidades
  apt:
    name:
      - bind9
      - bind9utils
    state: present
  become: yes

- name: Crear directorio de zonas si no existe
  file:
    path: /etc/bind/zones
    state: directory
    owner: bind
    group: bind
    mode: '0755'
  become: yes

- name: Asegurar que el directorio de zonas tenga permisos para bind
  file:
    path: /etc/bind/zones
    state: directory
    owner: bind
    group: bind
    mode: '0770' # Necesario para que bind escriba las llaves DNSSEC
  become: yes