---
- name: Habilitar servicio Bind9 al inicio
  systemd:
    name: bind9
    enabled: yes
  become: yes

- name: Iniciar servicio Bind9
  systemd:
    name: bind9
    state: started
  become: yes

- name: Verificar que Bind9 está escuchando en puerto 53
  wait_for:
    port: 53
    timeout: 10
  become: yes