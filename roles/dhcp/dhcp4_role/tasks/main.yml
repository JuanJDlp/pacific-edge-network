---
# ============================================================
#  tasks/main.yml
#  Punto de entrada — importa tareas por responsabilidad
# ============================================================

- name: Cargar variables según el sistema operativo
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"
  tags: [always]

- name: Instalar Kea
  ansible.builtin.import_tasks: install.yml
  tags: [install]

- name: Configurar directorios y permisos
  ansible.builtin.import_tasks: directories.yml
  tags: [config]

- name: Desplegar configuración de Kea
  ansible.builtin.import_tasks: configure.yml
  tags: [config]

- name: Gestionar el servicio Kea
  ansible.builtin.import_tasks: service.yml
  tags: [service]

- name: Verificar funcionamiento
  ansible.builtin.import_tasks: verify.yml
  tags: [verify]
