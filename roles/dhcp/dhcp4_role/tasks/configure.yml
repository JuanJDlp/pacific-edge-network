---
# ============================================================
#  tasks/configure.yml
#  Renderizar y desplegar kea-dhcp4.conf desde el template J2
# ============================================================

- name: Desplegar kea-dhcp4.conf desde template
  ansible.builtin.template:
    src: kea-dhcp4.conf.j2
    dest: "{{ kea_config_file }}"
    owner: "{{ kea_user }}"
    group: "{{ kea_group }}"
    mode: "0640"
  notify: Reiniciar Kea DHCPv4

- name: Validar sintaxis del config de Kea
  ansible.builtin.shell:
    cmd: "sudo -u {{ kea_user }} /usr/sbin/kea-dhcp4 -t {{ kea_config_file }} 2>&1 | tail -3"
  changed_when: false
  register: kea_syntax_check
  failed_when: kea_syntax_check.rc != 0
