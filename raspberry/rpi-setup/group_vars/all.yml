---
# ============================================================
# Variables compartidas — RPi Biblioteca Digital Ladrilleros
# ============================================================

# Red
rpi_ip: "192.168.20.10"
rpi_ipv6: "fd00:0:0:20::10"
minipc_captive_ip: "192.168.30.1"
minipc_captive_port: 2050
minipc_dns_ip: "192.168.10.1"
minipc_dns_ipv6: "fd00:0:0:10::1"

# Dominio local
dns_domain: "biblioteca.tel"

# Puertos de servicios locales (todos en loopback)
kiwix_port: 8080
kolibri_port: 8090
jellyfin_port: 8096

# Kiwix
kiwix_library: "/var/lib/biblioteca/zim/library.xml"
kiwix_user: "kiwix"

# Kiwix ZIM auto-update: category = subdirectorio en download.kiwix.org/zim/
# prefix = nombre del archivo sin la fecha (e.g., wikipedia_es_all_mini)
kiwix_zim_sources:
  - { category: "wikipedia",   prefix: "wikipedia_es_all_mini" }
  - { category: "wikibooks",   prefix: "wikibooks_es_all_nopic" }
  - { category: "wikinews",    prefix: "wikinews_es_all_nopic" }
  - { category: "wikiversity", prefix: "wikiversity_es_all_nopic" }
  - { category: "wikivoyage",  prefix: "wikivoyage_es_all_nopic" }

# Kolibri
kolibri_user: "akasicom"
kolibri_home: "/home/akasicom/.kolibri"

# Kolibri channel auto-update: id = UUID del canal en studio.learningequality.org
# NOTA: en una SD de 59G, Khan Academy (Español) ocupa ~36.6G y es el canal mas
# pesado. Ciencia NASA (3.1G) se removio (2026-06-01) para mantener el disco bajo
# el umbral de alarma (85%). El cron de auto-update borra automaticamente el
# contenido de cualquier canal instalado que ya no este en esta lista (orphan cleanup).
kolibri_channels:
  - { id: "c1f2b7e6ac9f56a2bb44fa7a48b66dce", name: "Khan Academy (Español)" }
  - { id: "359e048230974c8f80db1a95dc80d544", name: "EiE Familias (español)" }
  - { id: "f446655247a95c0aa94ca9fa4d66783b", name: "Proyecto Biosfera" }
  - { id: "fed29d60e4d84a1e8dcfc781d920b40e", name: "Biblioteca Elejandria" }

# Jellyfin
jellyfin_api_key: "1e2ba6b4e3ca45aa95627eddc7f46bf2"
jellyfin_media_dirs:
  - /var/lib/biblioteca/videos/comunitarios
  - /var/lib/biblioteca/videos/educativos
  - /var/lib/biblioteca/videos/culturales

# ---- Squid: filtrado HTTPS (peek+splice) + reverse-proxy cache biblioteca.tel ----
# Cuando squid_enable_biblioteca_accel = true, Squid bindea :443 públicamente
# (reverse proxy + cache) y nginx libera :443 (queda solo en 127.0.0.1:8443).
squid_enable_https_filter: true
squid_enable_biblioteca_accel: true

# Puertos
squid_intercept_https_port: 3130    # peek+splice / filtrado SNI
squid_accel_https_port: 443         # accel reverse proxy biblioteca.tel
biblioteca_backend_port: 80         # backend HTTP local (nginx en loopback)

# Rutas de certificados / DB
squid_bump_ca_cert: "/etc/squid/ssl/bump-ca.crt"
squid_bump_ca_key:  "/etc/squid/ssl/bump-ca.key"
squid_ssl_db:       "/var/lib/squid/ssl_db"
biblioteca_cert:    "/etc/squid/ssl/biblioteca.crt"
biblioteca_key:     "/etc/squid/ssl/biblioteca.key"

# Fuentes de blocklist (StevenBlack/hosts — categorías)
squid_blocklist_sources:
  - "https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/porn-only/hosts"
  - "https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/gambling-only/hosts"
squid_blocklist_path: "/etc/squid/blocklists/blocked_domains.txt"

# Cuando Squid maneja HTTPS, nginx no debe bindear :443 (queda en 127.0.0.1:8443)
nginx_serve_https: false

# ---- Health-check / panel de estado ----
# Umbrales publicados en /status (status.json). NOTA: el frontend status.js tiene
# su PROPIA copia hardcodeada de estos umbrales (TEMP_WARN/FAIL, DISK_WARN/FAIL);
# si se cambian aqui, actualizar tambien /var/www/html/js/status.js en la RPi.
health_cpu_temp_max: 75
health_disk_pct_max: 85
health_mem_pct_max: 80

# Particion de datos de la RPi (root) — reserved blocks bajados al 1% para headroom.
rpi_data_device: "/dev/mmcblk0p2"
rpi_reserved_pct: 1

# DNS secundario
dns_primary_ip: "192.168.10.1"
dns_primary_ipv6: "fd00:0:0:10::1"
dns_slave_listen_ips:
  - "127.0.0.1"
  - "192.168.20.10"
dns_slave_listen_ips_v6:
  - "::1"
  - "fd00:0:0:20::10"
