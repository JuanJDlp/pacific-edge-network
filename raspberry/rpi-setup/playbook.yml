---
- name: RPi — Servicios educativos biblioteca digital
  hosts: rpi
  become: true

  roles:
    - network_ipv6     # Dual-stack: asigna fd00:0:0:20::10 a eth0 (debe ir primero)
    - nginx
    - squid
    - kiwix
    - kolibri
    - jellyfin
    - node_exporter
    - dns_secondary
    - health_check    # panel de estado (/status) + tune2fs headroom de disco
