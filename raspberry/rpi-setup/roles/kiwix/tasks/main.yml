---
- name: Asegurar usuario kiwix existe
  user:
    name: "{{ kiwix_user }}"
    system: true
    shell: /usr/sbin/nologin
  become: true

- name: Crear directorio de logs de biblioteca
  file:
    path: /var/log/biblioteca
    state: directory
    owner: "{{ kiwix_user }}"
    group: "{{ kiwix_user }}"
    mode: "0755"
  become: true

- name: Desplegar unit kiwix-serve
  template:
    src: kiwix-serve.service.j2
    dest: /etc/systemd/system/kiwix-serve.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify:
    - reload systemd
    - restart kiwix-serve

- name: Habilitar e iniciar kiwix-serve
  systemd:
    name: kiwix-serve
    enabled: true
    state: started
    daemon_reload: true
  become: true
  ignore_errors: "{{ ansible_check_mode }}"
