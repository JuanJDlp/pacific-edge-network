---
- name: Asegurar nginx instalado
  apt:
    name: nginx
    state: present
  become: true

- name: Generar certificado autofirmado para biblioteca.tel
  command: >
    openssl req -x509 -nodes -days 3650 -newkey rsa:2048
    -keyout /etc/ssl/private/biblioteca.key
    -out /var/www/html/biblioteca-segura.crt
    -subj "/C=CO/ST=Valle del Cauca/L=Ladrilleros/O=Pacific Edge Network/CN=biblioteca.tel"
    -addext "subjectAltName=DNS:biblioteca.tel,DNS:www.biblioteca.tel,IP:192.168.20.1"
  args:
    creates: /var/www/html/biblioteca-segura.crt
  become: true
  notify: reload nginx

- name: Desplegar vhost biblioteca
  template:
    src: biblioteca.nginx.j2
    dest: /etc/nginx/sites-available/biblioteca
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload nginx

- name: Habilitar vhost biblioteca
  file:
    src: /etc/nginx/sites-available/biblioteca
    dest: /etc/nginx/sites-enabled/biblioteca
    state: link
  become: true
  notify: reload nginx

- name: Desplegar snippet kiwix-proxy
  template:
    src: kiwix-proxy.conf.j2
    dest: /etc/nginx/snippets/kiwix-proxy.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload nginx

- name: Deshabilitar vhost default de nginx
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  become: true
  notify: reload nginx

- name: Asegurar directorios de assets estaticos del portal
  file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  loop:
    - /var/www/html/js
    - /var/www/html/css
  become: true

- name: Calcular checksum de library.js (cache-busting)
  stat:
    path: "{{ role_path }}/files/library.js"
    checksum_algorithm: sha1
  register: library_js_src
  delegate_to: localhost
  become: false

- name: Calcular checksum de library.css (cache-busting)
  stat:
    path: "{{ role_path }}/files/library.css"
    checksum_algorithm: sha1
  register: library_css_src
  delegate_to: localhost
  become: false

- name: Desplegar library.js (buscador + recomendaciones)
  copy:
    src: library.js
    dest: /var/www/html/js/library.js
    owner: www-data
    group: www-data
    mode: "0644"
  become: true

- name: Desplegar status.js (actualización estado sistema)
  copy:
    src: status.js
    dest: /var/www/html/js/status.js
    owner: www-data
    group: www-data
    mode: "0644"
  become: true

- name: Desplegar library.css (estilos buscador + Descubre)
  copy:
    src: library.css
    dest: /var/www/html/css/library.css
    owner: www-data
    group: www-data
    mode: "0644"
  become: true

- name: Desplegar style.css (estilos base del portal)
  copy:
    src: style.css
    dest: /var/www/html/css/style.css
    owner: www-data
    group: www-data
    mode: "0644"
  become: true

- name: Desplegar splash.html
  copy:
    src: splash.html
    dest: /var/www/html/splash.html
    owner: www-data
    group: www-data
    mode: "0644"
  become: true

- name: Desplegar seguridad.html
  copy:
    src: seguridad.html
    dest: /var/www/html/seguridad.html
    owner: www-data
    group: www-data
    mode: "0644"
  become: true

- name: Desplegar guia de chat (chat-info.html)
  copy:
    src: chat-info.html
    dest: /var/www/html/chat-info.html
    owner: www-data
    group: www-data
    mode: "0644"
  become: true

# Despues del copy de library.{js,css} para que sus checksums esten al dia.
# Las URLs en index.html llevan ?v=<sha1-corto> -> al cambiar el archivo
# cambia la URL y el navegador no sirve la version cacheada (immutable).
- name: Desplegar index.html del portal (con asset version-bust)
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: "0644"
  vars:
    library_js_version: "{{ library_js_src.stat.checksum[:8] }}"
    library_css_version: "{{ library_css_src.stat.checksum[:8] }}"
  become: true

# Wiki estatica del proyecto (single-page) servida en /docs por nginx.
# El panel (index.html) enlaza aqui con el boton "Documentacion de la red".
- name: Asegurar directorio /var/www/html/docs
  file:
    path: /var/www/html/docs
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  become: true

- name: Desplegar wiki del proyecto (/docs)
  copy:
    src: docs.html
    dest: /var/www/html/docs/index.html
    owner: www-data
    group: www-data
    mode: "0644"
  become: true
  notify: reload nginx

- name: Validar configuración nginx
  command: nginx -t
  become: true
  changed_when: false
  ignore_errors: "{{ ansible_check_mode }}"

- name: Habilitar e iniciar nginx
  systemd:
    name: nginx
    enabled: true
    state: started
  become: true
