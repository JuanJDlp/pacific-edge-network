---
# ============================================================
#  vars/Debian.yml
#  Variables específicas para sistemas Debian/Ubuntu
#  Se cargan automáticamente según el ansible_os_family
# ============================================================

kea_package: "isc-kea*"
kea_service: "isc-kea-dhcp4-server.service"
kea_user: "_kea"
kea_group: "_kea"
kea_config_dir: "/etc/kea"
kea_config_file: "/etc/kea/kea-dhcp4.conf"
kea_leases_dir: "/var/lib/kea"
kea_leases_file: "/var/lib/kea/kea-leases4.csv"
kea_log_dir: "/var/log/kea"
kea_log_file: "/var/log/kea/kea-dhcp4.log"
