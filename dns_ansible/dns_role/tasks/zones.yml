---
- name: Crear archivo de zona directa (forward)
  template:
    src: db.forward.j2
    dest: "/etc/bind/zones/db.{{ dns_domain }}"
    owner: bind
    group: bind
    mode: '0644'
  become: yes
  notify: restart bind9

- name: Crear archivo de zona inversa (reverse)
  template:
    src: db.reverse.j2
    dest: "/etc/bind/zones/db.{{ dns_reverse_zone }}"
    owner: bind
    group: bind
    mode: '0644'
  become: yes
  notify: restart bind9

- name: Validar zona directa
  command: "named-checkzone {{ dns_domain }} /etc/bind/zones/db.{{ dns_domain }}"
  become: yes
  register: zone_check
  changed_when: false

- name: Validar zona inversa
  command: "named-checkzone {{ dns_reverse_zone }}.in-addr.arpa /etc/bind/zones/db.{{ dns_reverse_zone }}"
  become: yes
  register: reverse_check
  changed_when: false