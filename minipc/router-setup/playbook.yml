---
# ============================================================
# Playbook principal — Mini PC Pacific Edge Network
# Automatiza todos los servicios del router/gateway
#
# Uso completo:
#   ansible-playbook -i inventory.ini playbook.yml
#
# Solo un rol:
#   ansible-playbook -i inventory.ini playbook.yml --tags nftables
#   ansible-playbook -i inventory.ini playbook.yml --tags dns
#   ansible-playbook -i inventory.ini playbook.yml --tags dhcp
#   ansible-playbook -i inventory.ini playbook.yml --tags captive_portal
#   ansible-playbook -i inventory.ini playbook.yml --tags ntp
#   ansible-playbook -i inventory.ini playbook.yml --tags monitoring
#
# Dry-run:
#   ansible-playbook -i inventory.ini playbook.yml --check
#
# Verificación:
#   ansible-playbook -i inventory.ini playbook.yml --tags verify
# ============================================================

- name: Configurar Mini PC — router y servicios
  hosts: minipc
  become: true
  gather_facts: true

  pre_tasks:
    - name: Actualizar cache de apt
      apt:
        update_cache: true
        cache_valid_time: 3600
      tags: always

  roles:
    # 1. Red: interfaces, VLANs, IP forwarding, nftables, Jool NAT64
    - role: router
      tags: [router, nftables, netplan]

    # 2. DNS — Bind9 con dominio biblioteca.tel (reemplaza systemd-resolved en VLANs)
    - role: dns
      tags: [dns]

    # 3. DHCP — Kea DHCPv4 con reserva para RPi y DNS apuntando a Bind9
    - role: dhcp
      tags: [dhcp]

    # 4. Portal cautivo + nginx HTTP proxy intermediario hacia Squid en RPi
    #    Resuelve el problema SO_ORIGINAL_DST del DNAT cross-machine
    - role: captive_portal
      tags: [captive_portal, portal]

    # 5. NTP — chrony como servidor para todas las VLANs internas
    - role: ntp
      tags: [ntp]

    # 6. Monitoreo — Prometheus + Grafana + node_exporter
    - role: monitoring
      tags: [monitoring]

# ─── Play 2: Verificación ────────────────────────────────────────────────────

- name: Verificar configuración del Mini PC
  hosts: minipc
  become: true
  gather_facts: false
  tags: [verify, never]

  tasks:

    # ── Red básica ────────────────────────────────────────────────────────────
    - name: Verificar ip_forward IPv4
      command: sysctl net.ipv4.ip_forward
      register: ipv4_fwd
      changed_when: false

    - name: Assert ip_forward = 1
      assert:
        that: "'= 1' in ipv4_fwd.stdout"
        fail_msg: "ip_forward IPv4 no está habilitado"

    - name: Verificar rutas VLAN en tabla de routing
      command: ip route show
      register: route_table
      changed_when: false

    - name: Assert rutas VLAN presentes
      assert:
        that:
          - "'192.168.10.0/24' in route_table.stdout"
          - "'192.168.20.0/24' in route_table.stdout"
          - "'192.168.30.0/24' in route_table.stdout"
        fail_msg: "Faltan rutas VLAN en la tabla de routing"

    # ── nftables ──────────────────────────────────────────────────────────────
    - name: Verificar set captive_allowed
      command: nft list set inet filter captive_allowed
      changed_when: false

    - name: Verificar DNAT portal en nat prerouting
      command: nft list chain ip nat prerouting
      register: nft_nat
      changed_when: false

    - name: Assert DNAT portal cautivo presente
      assert:
        that: "'2050' in nft_nat.stdout"
        fail_msg: "DNAT del portal cautivo (puerto 2050) no encontrado en nftables"

    # ── DNS ───────────────────────────────────────────────────────────────────
    - name: Verificar Bind9 responde en 192.168.10.1
      command: dig @192.168.10.1 biblioteca.tel +short
      register: dns_check
      changed_when: false
      failed_when: dns_check.rc != 0 or dns_check.stdout == ""

    - name: Mostrar IP resuelta para biblioteca.tel
      debug:
        msg: "biblioteca.tel → {{ dns_check.stdout }}"

    # ── Servicios ─────────────────────────────────────────────────────────────
    - name: Verificar Kea DHCP4 activo
      command: systemctl is-active kea-dhcp4-server
      changed_when: false
      failed_when: false
      register: kea_active

    - name: Assert Kea activo
      assert:
        that: kea_active.stdout == 'active'
        fail_msg: "Kea DHCP4 no está activo"

    - name: Verificar nginx portal (puerto 2050)
      wait_for:
        port: 2050
        timeout: 5

    - name: Verificar nginx http-proxy (puerto 8888)
      wait_for:
        port: 8888
        timeout: 5

    - name: Verificar captive-accept (puerto 2051)
      wait_for:
        host: 127.0.0.1
        port: 2051
        timeout: 5

    - name: Verificar ping a internet (8.8.8.8)
      command: ping -c 2 -W 2 8.8.8.8
      changed_when: false
      failed_when: false
      register: ping_inet

    - name: Resumen final
      debug:
        msg:
          - "ip_forward:        {{ ipv4_fwd.stdout }}"
          - "biblioteca.tel:  {{ dns_check.stdout }}"
          - "ping internet:     {{ 'OK' if ping_inet.rc == 0 else 'FAIL (sin WAN)' }}"
          - "Todos los servicios verificados correctamente"
