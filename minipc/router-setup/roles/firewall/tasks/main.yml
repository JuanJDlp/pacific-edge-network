---
# ============================================================
# Rol: firewall
# Aplica reglas nftables mejoradas sobre la base del rol router.
# Este rol REEMPLAZA el nftables.conf del rol router con una
# versión más robusta que incluye:
#   - Rate limiting SSH, DNS, ICMP
#   - Bloqueo de puertos peligrosos desde WAN
#   - Aislamiento estricto entre VLANs
#   - Acceso a gestión solo desde VLAN10
#   - Logging de drops para diagnóstico
#   - Protección contra spoofing (RPF)
# ============================================================

- name: Instalar nftables
  apt:
    name: nftables
    state: present
    update_cache: true
  become: true
  tags: firewall

- name: Deshabilitar UFW (entra en conflicto con el firewall nftables)
  ansible.builtin.systemd:
    name: ufw
    enabled: false
    state: stopped
  become: true
  tags: firewall

- name: Desplegar ruleset nftables mejorado
  template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0640"
    validate: "nft -c -f %s"
  become: true
  notify: reload nftables
  tags: firewall

- name: Habilitar e iniciar nftables
  systemd:
    name: nftables
    enabled: true
    state: started
  become: true
  tags: firewall

- name: Verificar que el ruleset está cargado
  command: nft list ruleset
  register: nft_check
  changed_when: false
  failed_when: nft_check.stdout | length == 0
  become: true
  tags: firewall

- name: Verificar chain input existe
  command: nft list chain inet filter input
  changed_when: false
  become: true
  tags: firewall

- name: Verificar chain forward existe
  command: nft list chain inet filter forward
  changed_when: false
  become: true
  tags: firewall
