---
# ── DNSSEC para biblioteca.tel (dnssec-policy + inline-signing) ───────────────
# El firmado y la gestión/rotación de claves los hace BIND automáticamente
# (config en named.conf.local: `dnssec-policy default; inline-signing yes;`).
# Las claves viven en {{ dnssec_key_dir }}.
#
# Aquí solo: (1) forzar el reload pendiente para que BIND firme la zona,
# (2) esperar a que quede `secure: yes`, (3) extraer la KSK de la zona firmada
# y publicarla como trust anchor local para que el resolver valide y marque AD
# (biblioteca.tel es un TLD local sin cadena de confianza desde la raíz).

- name: DNSSEC | Aplicar configuración pendiente (reload named)
  meta: flush_handlers

- name: DNSSEC | Forzar reconfiguración de BIND
  command: rndc reconfig
  become: true
  changed_when: false

- name: "DNSSEC | Esperar a que la zona quede firmada (secure yes)"
  command: "rndc zonestatus {{ dns_domain }}"
  become: true
  register: dnssec_zonestatus
  until: "'secure: yes' in dnssec_zonestatus.stdout"
  retries: 30
  delay: 2
  changed_when: false

- name: DNSSEC | Extraer la KSK (flags 257) de la zona firmada
  shell: >
    dig +short @127.0.0.1 {{ dns_domain }} DNSKEY |
    awk '$1==257 { key=$4; for (i=5; i<=NF; i++) key=key $i; print $1, $2, $3, key }'
  become: true
  register: dnssec_ksk
  changed_when: false

- name: DNSSEC | Verificar que se obtuvo la KSK
  assert:
    that: dnssec_ksk.stdout | length > 0
    fail_msg: "No se encontró DNSKEY KSK (257) — la zona no quedó firmada."

- name: DNSSEC | Publicar trust anchor de {{ dns_domain }}
  copy:
    dest: "{{ dnssec_trust_anchor_file }}"
    owner: bind
    group: bind
    mode: "0644"
    content: |
      # Managed by Ansible — trust anchor (KSK) de {{ dns_domain }}
      # Permite al resolver local validar la zona firmada y marcar AD.
      trust-anchors {
          "{{ dns_domain }}." static-key {{ dnssec_ksk.stdout.split()[0] }} {{ dnssec_ksk.stdout.split()[1] }} {{ dnssec_ksk.stdout.split()[2] }} "{{ dnssec_ksk.stdout.split()[3] }}";
      };
  become: true
  notify: reload bind9
