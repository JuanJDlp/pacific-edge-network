---
- name: Instalar bind9 y utilidades
  apt:
    name:
      - bind9
      - bind9utils
      - bind9-doc
    state: present
    update_cache: true
  become: true

- name: Crear directorio de zonas
  file:
    path: /etc/bind/zones
    state: directory
    owner: bind
    group: bind
    mode: "0755"
  become: true

# ── Preparación DNSSEC (debe correr ANTES de validar named.conf.options) ──────
# named.conf.options incluye el trust-anchor file; key-directory debe existir
# para que inline-signing pueda escribir las claves.
- name: DNSSEC | Crear key-directory (claves auto-gestionadas por BIND)
  file:
    path: "{{ dnssec_key_dir }}"
    state: directory
    owner: bind
    group: bind
    mode: "0750"
  become: true

- name: DNSSEC | Asegurar trust-anchor file (placeholder si no existe)
  copy:
    dest: "{{ dnssec_trust_anchor_file }}"
    content: "# Trust anchor de {{ dns_domain }} — se completa tras firmar la zona\n"
    owner: bind
    group: bind
    mode: "0644"
    force: false
  become: true

# ── Deshabilitar systemd-resolved en interfaces LAN ──────────────────────────
# Bind9 necesita escuchar en 192.168.10.1/20.1/30.1 (TCP y UDP).
# El drop-in lan-stub.conf con DNSStubListenerExtra ocupa TCP en esas IPs,
# impidiendo que Bind9 lo haga y bloqueando zone transfers (AXFR).
# Se elimina el drop-in para que systemd-resolved solo quede en 127.0.0.53.
- name: Eliminar drop-in lan-stub.conf que bloquea TCP de Bind9 en VLANs
  file:
    path: /etc/systemd/resolved.conf.d/lan-stub.conf
    state: absent
  become: true
  notify:
    - restart systemd-resolved
    - restart bind9

- name: Configurar systemd-resolved stub solo en loopback
  lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: "^#?DNSStubListener="
    line: "DNSStubListener=yes"   # Solo escucha en 127.0.0.53
  become: true
  notify: restart systemd-resolved

# ── Configuración Bind9 ───────────────────────────────────────────────────────
- name: Desplegar named.conf.options
  # No se valida con `named-checkconf %s` (fragmento aislado): este archivo
  # incluye named.conf.rpz, cuyo response-policy referencia la zona rpz.blocklist
  # declarada en named.conf.local. La validación se hace sobre la config COMPLETA
  # más abajo, una vez desplegados todos los includes.
  template:
    src: named.conf.options.j2
    dest: /etc/bind/named.conf.options
    owner: bind
    group: bind
    mode: "0644"
  become: true
  notify: reload bind9

- name: Desplegar named.conf.local (declaración de zonas)
  template:
    src: named.conf.local.j2
    dest: /etc/bind/named.conf.local
    owner: bind
    group: bind
    mode: "0644"
  become: true
  notify: reload bind9

- name: Desplegar zona directa biblioteca.tel (en /var/lib/bind para inline-signing)
  template:
    src: db.forward.j2
    dest: "{{ dns_forward_zone_path }}"
    owner: bind
    group: bind
    mode: "0644"
  become: true
  notify: reload bind9

- name: Desplegar zonas inversas por VLAN
  template:
    src: db.reverse.j2
    dest: "/etc/bind/zones/db.{{ reverse_zone }}"
    owner: bind
    group: bind
    mode: "0644"
  loop: "{{ dns_reverse_zones }}"
  loop_control:
    loop_var: reverse_zone
  become: true
  notify: reload bind9

# ── TSIG ─────────────────────────────────────────────────────────────────────
# Se despliega ANTES de DNSSEC: el firmado fuerza un reload, y named.conf.local
# incluye named.conf.tsig — debe existir antes de recargar.
- name: Ejecutar tareas TSIG
  include_tasks: tsig.yml

# ── Validar config COMPLETA antes del reload que firma la zona ───────────────
# named.conf + todos los includes (options, local, rpz, tsig, trust-anchor).
# Si falla, el playbook se detiene y NO se recarga BIND.
- name: Validar configuración completa de BIND (named-checkconf)
  command: named-checkconf
  become: true
  changed_when: false

# ── DNSSEC ────────────────────────────────────
- name: Ejecutar tareas DNSSEC
  include_tasks: dnssec.yml

# ── RPZ offline zone (para wan-check.sh) ────────────────────────────────────
- name: Desplegar RPZ offline zone file
  template:
    src: rpz.offline.zone.j2
    dest: /etc/bind/zones/rpz.offline.zone
    owner: bind
    group: bind
    mode: "0644"
  become: true
  notify: reload bind9

- name: Desplegar RPZ config (enabled version)
  template:
    src: named.conf.rpz.enabled.j2
    dest: /etc/bind/named.conf.rpz.enabled
    owner: bind
    group: bind
    mode: "0644"
  become: true

- name: Desplegar RPZ config (disabled version)
  template:
    src: named.conf.rpz.disabled.j2
    dest: /etc/bind/named.conf.rpz.disabled
    owner: bind
    group: bind
    mode: "0644"
  become: true

- name: Inicializar RPZ activo como deshabilitado (si no existe)
  copy:
    src: /etc/bind/named.conf.rpz.disabled
    dest: /etc/bind/named.conf.rpz
    remote_src: true
    owner: bind
    group: bind
    mode: "0644"
    force: false
  become: true
  notify: reload bind9

# ── RPZ blocklist (porn+gambling) — zona permanente ─────────────────────────
- name: Desplegar RPZ blocklist seed (solo si no existe)
  template:
    src: rpz.blocklist.seed.zone.j2
    dest: /etc/bind/zones/rpz.blocklist.zone
    owner: bind
    group: bind
    mode: "0644"
    force: false
  become: true
  notify: reload bind9

- name: Desplegar script update-bind-rpz
  copy:
    src: update-bind-rpz
    dest: /usr/local/sbin/update-bind-rpz
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Desplegar bind-rpz-update.service
  template:
    src: bind-rpz-update.service.j2
    dest: /etc/systemd/system/bind-rpz-update.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: daemon-reload

- name: Desplegar bind-rpz-update.timer
  template:
    src: bind-rpz-update.timer.j2
    dest: /etc/systemd/system/bind-rpz-update.timer
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: daemon-reload

- name: Habilitar e iniciar bind-rpz-update.timer
  systemd:
    name: bind-rpz-update.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Ejecutar update-bind-rpz inicialmente (si zona vacia)
  command: /usr/local/sbin/update-bind-rpz
  args:
    creates: /var/lib/bind-rpz-bootstrap.done
  become: true
  register: rpz_bootstrap
  changed_when: rpz_bootstrap.rc == 0

- name: Marcar bootstrap RPZ como hecho
  file:
    path: /var/lib/bind-rpz-bootstrap.done
    state: touch
  become: true
  when: rpz_bootstrap is succeeded

- name: Validar zona directa con named-checkzone
  command: "named-checkzone {{ dns_domain }} {{ dns_forward_zone_path }}"
  become: true
  changed_when: false
  ignore_errors: "{{ ansible_check_mode }}"

- name: Habilitar e iniciar bind9
  systemd:
    name: named
    enabled: true
    state: started
  become: true
  ignore_errors: "{{ ansible_check_mode }}"

- name: Verificar que Bind9 escucha en puerto 53
  wait_for:
    host: "{{ dns_primary_ip }}"
    port: 53
    timeout: 15
  become: true
  ignore_errors: "{{ ansible_check_mode }}"
