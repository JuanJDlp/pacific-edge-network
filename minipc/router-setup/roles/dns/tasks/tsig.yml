---
# ── TSIG: autenticación de zone transfers Master ↔ Slave ─────────────────────
# La clave (ns1-ns2., hmac-sha256) es ESTÁTICA y compartida: su secret vive en
# la var `tsig_secret` (vars/main.yml del master y group_vars/all.yml del slave).
# El master la despliega aquí; el slave la despliega en su rol dns_secondary.
# No se genera en runtime ni se delega cross-host (la laptop de control no
# alcanza la VLAN 20, lo que rompía el `delegate_to` del enfoque anterior).

- name: TSIG | Desplegar named.conf.tsig en master
  template:
    src: named.conf.tsig.j2
    dest: /etc/bind/named.conf.tsig
    owner: bind
    group: bind
    mode: "0640"
  become: true
  notify: reload bind9
