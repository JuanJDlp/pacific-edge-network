[Unit]
# Tras 3 fallos en 60s named entra en estado "failed" → activa el failover DNS.
StartLimitBurst=3
StartLimitIntervalSec=60s
OnFailure=dns-failover.service

[Service]
# Reintentos automáticos antes de rendirse
Restart=on-failure
RestartSec=5s
# Al arrancar con éxito restaura el DNAT al master
ExecStartPost=/usr/local/sbin/dns-failover restore
