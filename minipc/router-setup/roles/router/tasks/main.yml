---
# ─── Validation ───────────────────────────────────────────────────────────────

- name: Gather network facts
  ansible.builtin.setup:
    gather_subset:
      - network
  tags: always

- name: Validate WAN interface exists on host
  ansible.builtin.assert:
    that: wan_interface in ansible_interfaces
    fail_msg: >
      WAN interface '{{ wan_interface }}' not found on this host.
      Available interfaces: {{ ansible_interfaces | join(', ') }}.
      Please update roles/router/vars/main.yml and set wan_interface correctly.
  tags: always

- name: Validate LAN interface exists on host
  ansible.builtin.assert:
    that: lan_interface in ansible_interfaces
    fail_msg: >
      LAN interface '{{ lan_interface }}' not found on this host.
      Available interfaces: {{ ansible_interfaces | join(', ') }}.
      Please update roles/router/vars/main.yml and set lan_interface correctly.
  tags: always

# ─── Packages ─────────────────────────────────────────────────────────────────

- name: Install required packages
  ansible.builtin.apt:
    name:
      - nftables
      - netplan.io
      - linux-headers-{{ ansible_kernel }}
    state: present
    update_cache: true
  tags: networking, firewall, nat64

- name: Enable Ubuntu universe repository (required for Jool)
  ansible.builtin.apt_repository:
    repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_distribution_release }} universe"
    state: present
    update_cache: true
  tags: nat64

- name: Install Jool packages from universe
  ansible.builtin.apt:
    name:
      - jool-dkms
      - jool-tools
    state: present
  register: jool_install
  tags: nat64

# ─── IP Forwarding ────────────────────────────────────────────────────────────

- name: Enable IPv4 forwarding persistently
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true
  tags: networking

- name: Enable IPv6 forwarding persistently
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    sysctl_set: true
    state: present
    reload: true
  tags: networking

# ─── Netplan ──────────────────────────────────────────────────────────────────

- name: Create backup directory for netplan configs
  ansible.builtin.file:
    path: /etc/netplan/backups
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: networking

- name: Backup all existing netplan files before any change
  ansible.builtin.shell:
    cmd: >
      for f in /etc/netplan/*.yaml; do
        [ -f "$f" ] && cp -p "$f" /etc/netplan/backups/"$(basename $f).$(date +%Y%m%d-%H%M%S).bak" || true;
      done
  changed_when: false
  tags: networking

- name: Remove default cloud-init netplan config
  ansible.builtin.file:
    path: /etc/netplan/50-cloud-init.yaml
    state: absent
  notify: Apply netplan configuration
  tags: networking

- name: Deploy netplan router configuration
  ansible.builtin.template:
    src: netplan.yaml.j2
    dest: /etc/netplan/00-router.yaml
    owner: root
    group: root
    mode: "0600"
  notify: Apply netplan configuration
  tags: networking

- name: Flush handlers to apply netplan before nftables validation
  ansible.builtin.meta: flush_handlers
  tags: networking

- name: Check if VLAN interfaces already exist
  ansible.builtin.command:
    cmd: ip link show {{ lan_interface }}.10
  register: vlan_exists_check
  changed_when: false
  failed_when: false
  tags: networking

- name: Apply netplan now if VLAN interfaces are missing
  ansible.builtin.command:
    cmd: netplan apply
  when: vlan_exists_check.rc != 0
  changed_when: true
  tags: networking

# ─── nftables ─────────────────────────────────────────────────────────────────

- name: Deploy nftables firewall ruleset
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0640"
    validate: "nft -c -f %s"
  notify: Reload nftables service
  tags: firewall

- name: Enable and start nftables service
  ansible.builtin.service:
    name: nftables
    enabled: true
    state: started
  tags: firewall

- name: Disable UFW (conflicts with nftables-based firewall)
  ansible.builtin.systemd:
    name: ufw
    enabled: false
    state: stopped
  tags: firewall

# ─── Jool NAT64 ───────────────────────────────────────────────────────────────

- name: Load Jool kernel module
  ansible.builtin.command:
    cmd: modprobe jool
  register: modprobe_jool
  changed_when: false
  failed_when: false
  tags: nat64

- name: Warn if Jool module could not be loaded (reboot may be required)
  ansible.builtin.debug:
    msg: >
      WARNING: The Jool kernel module could not be loaded (exit code {{ modprobe_jool.rc }}).
      A system reboot may be required to activate the newly compiled DKMS module.
      After rebooting, re-run this playbook with --tags nat64.
  when: modprobe_jool.rc != 0
  tags: nat64

- name: Deploy Jool NAT64 systemd unit
  ansible.builtin.template:
    src: jool-nat64.service.j2
    dest: /etc/systemd/system/jool-nat64.service
    owner: root
    group: root
    mode: "0644"
  register: jool_service_file
  tags: nat64

- name: Reload systemd daemon after unit change
  ansible.builtin.systemd:
    daemon_reload: true
  when: jool_service_file.changed
  tags: nat64

- name: Enable and start Jool NAT64 service
  ansible.builtin.systemd:
    name: jool-nat64
    enabled: true
    state: started
  when: modprobe_jool.rc == 0
  tags: nat64

- name: Skip Jool service start (module not loaded yet)
  ansible.builtin.debug:
    msg: "Skipping jool-nat64 service start — module not available. Reboot and re-run playbook."
  when: modprobe_jool.rc != 0
  tags: nat64

# ─── Persist Jool module load on boot ────────────────────────────────────────

- name: Ensure Jool module is loaded on boot via modules-load.d
  ansible.builtin.copy:
    content: "jool\n"
    dest: /etc/modules-load.d/jool.conf
    owner: root
    group: root
    mode: "0644"
  tags: nat64

# ─── Verification assertions ──────────────────────────────────────────────────

- name: Read ip_forward value from proc
  ansible.builtin.slurp:
    src: /proc/sys/net/ipv4/ip_forward
  register: ip_forward_content
  tags: networking

- name: Assert ip_forward is 1 via proc
  ansible.builtin.assert:
    that: ip_forward_content.content | b64decode | trim == '1'
    fail_msg: "ip_forward is not 1, got: {{ ip_forward_content.content | b64decode | trim }}"
  tags: networking

- name: Assert VLAN 20 interface exists
  ansible.builtin.command:
    cmd: ip link show {{ lan_interface }}.20
  register: vlan20_check
  changed_when: false
  failed_when: vlan20_check.rc != 0
  tags: networking

- name: Assert nftables ruleset is not empty
  ansible.builtin.command:
    cmd: nft list ruleset
  register: nft_ruleset
  changed_when: false
  failed_when: nft_ruleset.stdout | length == 0
  tags: firewall
