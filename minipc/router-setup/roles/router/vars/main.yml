---
# Network interfaces (adjust if different on target host)
wan_interface: enp170s0
lan_interface: enp171s0
mgmt_interface: wt0   # Tailscale VPN - must not be blocked

# VLAN definitions
vlans:
  - id: 10
    name: Gestion
    ipv4_address: "192.168.10.1"
    ipv4_prefix: 24
    ipv6_address: "fd00:0:0:10::1"
    ipv6_prefix: 64
  - id: 20
    name: Servidores
    ipv4_address: "192.168.20.1"
    ipv4_prefix: 24
    ipv6_address: "fd00:0:0:20::1"
    ipv6_prefix: 64
  - id: 30
    name: Clientes
    ipv4_address: "192.168.30.1"
    ipv4_prefix: 24
    ipv6_address: "fd00:0:0:30::1"
    ipv6_prefix: 64

# Forced internal DNS redirect destination (Pi-hole will listen here)
dns_redirect_ip: "192.168.10.1"

# NAT64 pool6 prefix
nat64_prefix: "64:ff9b::/96"

# Jool instance name
jool_instance_name: "default"

# Captive portal
captive_portal_port: 2050

# HTTP proxy intermediario (nginx en Mini PC → Squid en RPi)
# Soluciona el problema SO_ORIGINAL_DST en DNAT cross-machine
http_proxy_port: 8888

# IP de la RPi (excluida del DNAT de proxy para acceso directo a biblioteca.tel)
rpi_ip: "192.168.20.10"

# Puerto forward proxy de Squid en la RPi (no intercept, evita loop detection)
squid_forward_port: 3129
