---
- name: Instalar paquetes del portal cautivo
  apt:
    name:
      - nginx
      - conntrack  # para conntrack -D: limpiar entradas DNAT cacheadas al autenticar
    state: present
    update_cache: true
  become: true

- name: Crear directorio del portal cautivo
  file:
    path: /etc/captive-portal
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  become: true

- name: Copiar splash.html
  copy:
    src: splash.html
    dest: /etc/captive-portal/splash.html
    owner: www-data
    group: www-data
    mode: "0644"
  become: true
  notify: reload nginx

- name: Copiar offline.html
  copy:
    src: offline.html
    dest: /etc/captive-portal/offline.html
    owner: www-data
    group: www-data
    mode: "0644"
  become: true
  notify: reload nginx

- name: Copiar captive-accept.py
  copy:
    src: captive-accept.py
    dest: /usr/local/bin/captive-accept.py
    owner: root
    group: root
    mode: "0755"
  become: true
  notify: restart captive-accept

# ── nginx: desactivar sitio default ──────────────────────────────────────────
- name: Eliminar sitio default de nginx
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  become: true
  notify: reload nginx

# ── nginx: splash page (puerto captive_portal_port) ─────────────────────────
- name: Desplegar config nginx — portal cautivo (splash)
  template:
    src: captive-portal.nginx.j2
    dest: /etc/nginx/sites-available/captive-portal
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload nginx

- name: Crear directorio para certificados SSL
  file:
    path: /etc/nginx/ssl
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Generar certificado SSL autofirmado para el portal
  command: >
    openssl req -x509 -nodes -days 365 -newkey rsa:2048
    -keyout /etc/nginx/ssl/captive.key
    -out /etc/nginx/ssl/captive.crt
    -subj "/C=CO/ST=Valle del Cauca/L=Palmira/O=Pacific Edge/CN=portal.pacificedge.local"
  args:
    creates: /etc/nginx/ssl/captive.crt
  become: true
  notify: reload nginx

- name: Habilitar sitio captive-portal en nginx
  file:
    src: /etc/nginx/sites-available/captive-portal
    dest: /etc/nginx/sites-enabled/captive-portal
    state: link
  become: true
  notify: reload nginx

# ── nginx: http proxy intermediario (puerto http_proxy_port) ─────────────────
- name: Desplegar config nginx — HTTP proxy intermediario para Squid
  template:
    src: http-proxy.nginx.j2
    dest: /etc/nginx/sites-available/http-proxy
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload nginx

- name: Habilitar sitio http-proxy en nginx
  file:
    src: /etc/nginx/sites-available/http-proxy
    dest: /etc/nginx/sites-enabled/http-proxy
    state: link
  become: true
  notify: reload nginx

# ── nginx: http proxy offline mode (para wan-check.sh) ────────────────────────
- name: Desplegar config nginx — HTTP proxy offline (sin Squid)
  template:
    src: http-proxy-offline.nginx.j2
    dest: /etc/nginx/sites-available/http-proxy-offline
    owner: root
    group: root
    mode: "0644"
  become: true

# ── WAN health check — toggle modo offline ───────────────────────────────────
- name: Copiar wan-check.sh
  copy:
    src: wan-check.sh
    dest: /usr/local/bin/wan-check.sh
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Desplegar wan-check.service
  template:
    src: wan-check.service.j2
    dest: /etc/systemd/system/wan-check.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload systemd

- name: Desplegar wan-check.timer
  template:
    src: wan-check.timer.j2
    dest: /etc/systemd/system/wan-check.timer
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload systemd

- name: Habilitar e iniciar wan-check.timer
  systemd:
    name: wan-check.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true
  ignore_errors: "{{ ansible_check_mode }}"

# ── Systemd units ─────────────────────────────────────────────────────────────
- name: Desplegar unit captive-portal.service
  template:
    src: captive-portal.service.j2
    dest: /etc/systemd/system/captive-portal.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify:
    - reload systemd

- name: Desplegar unit captive-accept.service
  template:
    src: captive-accept.service.j2
    dest: /etc/systemd/system/captive-accept.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify:
    - reload systemd
    - restart captive-accept

- name: Habilitar e iniciar captive-accept
  systemd:
    name: captive-accept
    enabled: true
    state: started
    daemon_reload: true
  become: true
  ignore_errors: "{{ ansible_check_mode }}"

# captive-portal.service intenta arrancar su propio proceso nginx, pero nginx.service
# ya lo gestiona (auto-arrancado por apt). Ambos peleaban por los mismos puertos en un
# race condition de boot. Se deshabilita captive-portal.service; nginx.service es el dueño.
- name: Deshabilitar captive-portal.service (nginx.service gestiona nginx)
  systemd:
    name: captive-portal
    enabled: false
    state: stopped
    daemon_reload: true
  become: true
  ignore_errors: "{{ ansible_check_mode }}"

- name: Asegurar nginx.service habilitado e iniciado
  systemd:
    name: nginx
    enabled: true
    state: started
  become: true
  ignore_errors: "{{ ansible_check_mode }}"

- name: Validar config nginx
  command: nginx -t
  become: true
  changed_when: false
  ignore_errors: "{{ ansible_check_mode }}"
