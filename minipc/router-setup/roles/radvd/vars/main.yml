---
# ============================================================
# radvd — Router Advertisement Daemon (SLAAC + RDNSS)
# Anuncia prefijos IPv6 ULA en cada VLAN para que los clientes
# autoconfiguren su dirección global vía SLAAC.
# ============================================================

lan_interface: "enp171s0"

# Dominio para DNS Search List anunciado por RA
radvd_dnssl: "biblioteca.tel"

# VLANs donde se emiten Router Advertisements
# Cada entrada: id, prefix, rdnss (gateway IPv6 de esa VLAN = recursor)
radvd_vlans:
  - id: 10
    prefix: "fd00:0:0:10::/64"
    rdnss: "fd00:0:0:10::1"
  - id: 20
    prefix: "fd00:0:0:20::/64"
    rdnss: "fd00:0:0:20::1"
  - id: 30
    prefix: "fd00:0:0:30::/64"
    rdnss: "fd00:0:0:30::1"

# Intervalos de RA (segundos)
radvd_min_rtr_adv_interval: 30
radvd_max_rtr_adv_interval: 100
radvd_default_lifetime: 1800
radvd_rdnss_lifetime: 300
radvd_dnssl_lifetime: 300
